services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://amana:${DB_PASSWORD}@db:5432/amana
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - AUTH_TRUST_HOST=true
      - VESICASH_API_URL=${VESICASH_API_URL}
      - VESICASH_PRIVATE_KEY=${VESICASH_PRIVATE_KEY}
      - VESICASH_PUBLIC_KEY=${VESICASH_PUBLIC_KEY}
      - FLUTTERWAVE_PUBLIC_KEY=${FLUTTERWAVE_PUBLIC_KEY}
      - FLUTTERWAVE_SECRET_KEY=${FLUTTERWAVE_SECRET_KEY}
      - FLUTTERWAVE_WEBHOOK_HASH=${FLUTTERWAVE_WEBHOOK_HASH}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - amana-network

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=amana
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=amana
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amana"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - amana-network

volumes:
  postgres-data:

networks:
  amana-network:
    driver: bridge
